<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Virtuoso pedal thumbnail: an ascending scale run on a fretboard
       fragment, in the plugin's default ss accent palette (screen.html). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10101e"/>
      <stop offset="1" stop-color="#080812"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="40" fill="url(#bg)"/>
  <rect x="3" y="3" width="250" height="250" rx="37" fill="none" stroke="#60a5fa" stroke-opacity="0.28" stroke-width="2"/>

  <!-- fret lines (vertical) -->
  <g stroke="#3a3a52" stroke-width="3">
    <line x1="60"  y1="34" x2="60"  y2="222"/>
    <line x1="118" y1="34" x2="118" y2="222"/>
    <line x1="172" y1="34" x2="172" y2="222"/>
    <line x1="220" y1="34" x2="220" y2="222"/>
  </g>
  <!-- nut (heavier, leftmost) -->
  <line x1="36" y1="32" x2="36" y2="224" stroke="#6a6a85" stroke-width="7"/>

  <!-- strings (horizontal; thinner toward the top, like a real neck) -->
  <g stroke="#565672">
    <line x1="28" y1="48"  x2="232" y2="48"  stroke-width="2"/>
    <line x1="28" y1="88"  x2="232" y2="88"  stroke-width="2.6"/>
    <line x1="28" y1="128" x2="232" y2="128" stroke-width="3.2"/>
    <line x1="28" y1="168" x2="232" y2="168" stroke-width="3.8"/>
    <line x1="28" y1="208" x2="232" y2="208" stroke-width="4.4"/>
  </g>

  <!-- ascending scale run: low string up to high string -->
  <g>
    <circle cx="89"  cy="208" r="30" fill="url(#glow)"/>
    <circle cx="89"  cy="208" r="17" fill="url(#gem)" stroke="#60a5fa" stroke-width="2.5" stroke-opacity="0.7"/>

    <circle cx="145" cy="168" r="30" fill="url(#glow)"/>
    <circle cx="145" cy="168" r="17" fill="url(#gem)" stroke="#60a5fa" stroke-width="2.5" stroke-opacity="0.7"/>

    <circle cx="89"  cy="128" r="30" fill="url(#glow)"/>
    <circle cx="89"  cy="128" r="17" fill="url(#gem)" stroke="#60a5fa" stroke-width="2.5" stroke-opacity="0.7"/>

    <circle cx="145" cy="88"  r="30" fill="url(#glow)"/>
    <circle cx="145" cy="88"  r="17" fill="url(#gem)" stroke="#60a5fa" stroke-width="2.5" stroke-opacity="0.7"/>

    <!-- the "current" note — brightest, like the playhead hit -->
    <circle cx="196" cy="48"  r="38" fill="url(#glow)"/>
    <circle cx="196" cy="48"  r="19" fill="#2563eb" stroke="#93c5fd" stroke-width="3"/>
    <circle cx="196" cy="48"  r="8"  fill="#bfdbfe" fill-opacity="0.9"/>
  </g>
</svg>
